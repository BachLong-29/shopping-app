<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Halo · Considered things, beautifully shipped</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="components.css"/>
<style>
  /* Viewport simulation + desktop/mobile-only utilities */
  .desktop-only { display: flex; }
  .mobile-only { display: none; }
  .cart-badge {
    position: absolute; top: 6px; right: 6px;
    min-width: 16px; height: 16px; padding: 0 4px;
    background: var(--brand-rose); color: white;
    border-radius: var(--r-full);
    font-size: 10px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center;
    border: 2px solid var(--bg);
  }

  .mobile-bottom-nav {
    display: none;
    position: fixed; bottom: 12px; left: 12px; right: 12px;
    border-radius: var(--r-full);
    box-shadow: var(--shadow-lg);
    height: 64px;
    align-items: center;
    z-index: 100;
    padding: 0 8px;
  }

  /* Tablet/mobile breakpoints */
  @media (max-width: 900px) {
    .desktop-only { display: none !important; }
    .mobile-only { display: inline-flex !important; }
    .mobile-bottom-nav { display: flex; }
    main { padding-bottom: 96px; }
  }

  /* Mobile-viewport simulator (when Tweaks selects 'mobile') */
  .viewport-mobile {
    max-width: 414px;
    margin: 0 auto;
    min-height: 100vh;
    box-shadow: 0 0 0 1px var(--border), 0 24px 60px rgba(0,0,0,0.12);
    position: relative;
    overflow-x: hidden;
    background: var(--bg);
  }
  .viewport-mobile .desktop-only { display: none !important; }
  .viewport-mobile .mobile-only { display: inline-flex !important; }
  .viewport-mobile .mobile-bottom-nav { display: flex; }
  .viewport-mobile main { padding-bottom: 96px; }
  .viewport-mobile .features-grid { grid-template-columns: repeat(2, 1fr) !important; }
  .viewport-mobile .cat-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
  .viewport-mobile .products-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 14px !important; }
  .viewport-mobile .browse-grid { grid-template-columns: 1fr !important; }
  .viewport-mobile .filter-rail { position: fixed !important; inset: 0; max-height: 100vh !important; z-index: 200; border-radius: 0; transform: translateX(-100%); transition: transform 0.3s; }
  .viewport-mobile .filter-rail.open { transform: translateX(0); }
  .viewport-mobile .browse-products-grid { grid-template-columns: 1fr !important; }
  .viewport-mobile .test-grid { grid-template-columns: 1fr !important; }
  .viewport-mobile .footer-top { grid-template-columns: 1fr !important; }
  .viewport-mobile .footer-cols { grid-template-columns: repeat(2, 1fr) !important; }
  .viewport-mobile .best-grid { grid-template-columns: 1fr !important; }
  .viewport-mobile .flash-grid { grid-template-columns: 1fr !important; }
  .viewport-mobile .hero-grid { grid-template-columns: 1fr !important; }
  .viewport-mobile .hero-grid > div:last-child { min-height: 320px !important; order: -1 !important; }
  .viewport-mobile section { padding-left: 16px !important; padding-right: 16px !important; }
  .viewport-mobile header { padding-left: 0 !important; padding-right: 0 !important; }
  .viewport-mobile header > div { padding-left: 16px !important; padding-right: 16px !important; }

  body { overflow-x: hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shop-header.jsx"></script>
<script type="text/babel" src="shop-hero.jsx"></script>
<script type="text/babel" src="shop-products.jsx"></script>
<script type="text/babel" src="shop-extras.jsx"></script>
<script type="text/babel" src="shop-overlays.jsx"></script>
<script type="text/babel" src="shop-app.jsx"></script>
</body>
</html>
