<style>
  .desktop-only { display: flex; }
  .mobile-only { display: none; }

  /* Sidebar collapsed tooltip */
  .sidebar-tt {
    position: absolute; left: calc(100% + 12px); top: 50%; transform: translateY(-50%);
    background: var(--fg); color: var(--bg);
    padding: 6px 10px; border-radius: var(--r-sm);
    font-size: 12px; font-weight: 500; white-space: nowrap;
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s ease;
    box-shadow: var(--shadow-md);
    z-index: 200;
  }
  .admin-sidebar.collapsed .sidebar-item:hover .sidebar-tt { opacity: 1; }

  .admin-sidebar.collapsed .sidebar-item:hover {
    background: var(--bg-muted);
  }

  /* Sticky table cells */
  .admin-table thead th { position: sticky; top: 0; z-index: 2; background: var(--bg-tint); }
  .admin-table .th-sticky-l { position: sticky; z-index: 3; background: var(--bg-tint); }
  .admin-table .th-sticky-l[data-pos="0"] { left: 0; }
  .admin-table .th-sticky-l[data-pos="1"] { left: 44px; }
  .admin-table .th-sticky-l[data-pos="2"] { left: 144px; }
  .admin-table .th-sticky-r { position: sticky; right: 0; z-index: 3; background: var(--bg-tint); }

  .admin-table .td-sticky-l { position: sticky; z-index: 1; background: inherit; }
  .admin-table .td-sticky-l[data-pos="0"] { left: 0; }
  .admin-table .td-sticky-l[data-pos="1"] { left: 44px; }
  .admin-table .td-sticky-l[data-pos="2"] { left: 144px; }
  .admin-table .td-sticky-r { position: sticky; right: 0; z-index: 1; background: inherit; }

  /* Shadow on sticky boundaries */
  .admin-table .th-sticky-l[data-pos="2"]::after,
  .admin-table .td-sticky-l[data-pos="2"]::after {
    content: ''; position: absolute; top: 0; right: -8px; bottom: 0; width: 8px;
    background: linear-gradient(90deg, rgba(0,0,0,0.05), transparent);
    pointer-events: none;
  }
  .admin-table .th-sticky-r::before,
  .admin-table .td-sticky-r::before {
    content: ''; position: absolute; top: 0; left: -8px; bottom: 0; width: 8px;
    background: linear-gradient(-90deg, rgba(0,0,0,0.05), transparent);
    pointer-events: none;
  }

  .admin-table tbody tr { background: var(--surface); }
  .admin-table tbody tr td { border-bottom: 1px solid var(--border); }

  /* Density */
  .density-compact .admin-table tbody td { padding-top: 8px; padding-bottom: 8px; }

  .filter-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 8px 4px 10px;
    border-radius: 999px;
    background: var(--bg-muted);
    font-size: 11px; font-weight: 500;
    transition: opacity 0.15s ease;
  }
  .filter-chip:hover { opacity: 0.85; }

  /* Range dual thumbs */
  input[type="range"]::-webkit-slider-thumb { pointer-events: all; -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: white; border: 2px solid var(--fg); box-shadow: var(--shadow-md); cursor: grab; }
  input[type="range"]::-moz-range-thumb { pointer-events: all; width: 18px; height: 18px; border-radius: 50%; background: white; border: 2px solid var(--fg); box-shadow: var(--shadow-md); cursor: grab; }

  .mobile-cards { display: none; }

  /* Tablet breakpoint */
  @media (max-width: 1100px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr) !important; }
  }

  /* Mobile breakpoint */
  @media (max-width: 900px) {
    .desktop-only { display: none !important; }
    .mobile-only { display: inline-flex !important; }
    .admin-sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
      transform: translateX(-100%);
      transition: transform 0.3s var(--ease-out);
      width: 248px !important;
    }
    .admin-sidebar.mobile-open { transform: translateX(0); }
    .admin-sidebar.collapsed { width: 248px !important; }
    .stat-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .desktop-table { display: none; }
    .mobile-cards { display: block; }
  }

  /* Viewport simulator */
  .viewport-mobile {
    max-width: 414px;
    margin: 0 auto;
    box-shadow: 0 0 0 1px var(--border), 0 24px 60px rgba(0,0,0,0.12);
  }
  .viewport-mobile .desktop-only { display: none !important; }
  .viewport-mobile .mobile-only { display: inline-flex !important; }
  .viewport-mobile .admin-sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
    transform: translateX(-100%); width: 248px !important;
  }
  .viewport-mobile .admin-sidebar.mobile-open { transform: translateX(0); }
  .viewport-mobile .stat-grid { grid-template-columns: 1fr !important; }
  .viewport-mobile .desktop-table { display: none; }
  .viewport-mobile .mobile-cards { display: block; }

  body { overflow-x: hidden; }
</style>
</head>
