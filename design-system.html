<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Halo · Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="tokens.css"/>

<style>
  .desktop-only { display: flex; }
  .mobile-only { display: none; }
  .cart-badge {
    position: absolute; top: 6px; right: 6px;
    min-width: 16px; height: 16px; padding: 0 4px;
    background: var(--brand-rose); color: white;
    border-radius: var(--r-full);
    font-size: 10px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center;
  }
  body { background: var(--bg); }
  /* anchor offset for nav */
  section[id] { scroll-margin-top: 80px; }
  @media (max-width: 900px) {
    .ds-layout { grid-template-columns: 1fr !important; }
    .ds-layout aside { display: none; }
    .ds-layout main { padding-left: 0 !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
